<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>샘플 커스텀 페이지</title>
  <script type="text/javascript" src="/eel.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Malgun Gothic', sans-serif; background: #f8fafc; color: #1e293b; padding: 32px; }
    h1 { font-size: 22px; font-weight: 700; color: #0f172a; margin-bottom: 8px; }
    p { font-size: 13px; color: #64748b; margin-bottom: 24px; line-height: 1.7; }
    .card { background: #fff; border: 1px solid #eef2f7; border-radius: 12px; padding: 20px 24px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(15,23,42,.05); }
    .card h2 { font-size: 14px; font-weight: 600; color: #1e293b; margin-bottom: 12px; }
    button { background: linear-gradient(135deg,#6366f1,#4f46e5); color: #fff; border: none; border-radius: 8px; padding: 8px 16px; font-size: 13px; font-weight: 500; cursor: pointer; }
    button:hover { opacity: 0.9; }
    #result { margin-top: 12px; font-size: 12.5px; color: #475569; background: #f1f5f9; border-radius: 8px; padding: 10px 14px; white-space: pre-wrap; font-family: monospace; }
  </style>
</head>
<body>
  <h1>샘플 커스텀 페이지</h1>
  <p>이 페이지는 <code>web/pages/sample.html</code>에 저장된 커스텀 HTML 파일입니다.<br>
  <code>eel.js</code>를 로드하면 모든 백엔드 함수를 그대로 호출할 수 있습니다.</p>

  <div class="card">
    <h2>VOC 목록 조회 예시</h2>
    <button onclick="loadVocs()">VOC 불러오기</button>
    <div id="result">버튼을 클릭하면 VOC 목록을 가져옵니다.</div>
  </div>

  <script>
    async function loadVocs() {
      const el = document.getElementById('result');
      el.textContent = '로딩 중...';
      try {
        const vocs = await eel.get_vocs()();
        el.textContent = `총 ${vocs.length}건\n` + vocs.slice(0, 5).map(v => `[${v.id}] ${v.title}`).join('\n');
      } catch (e) {
        el.textContent = '오류: ' + e;
      }
    }
  </script>
</body>
</html>
