<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>VOC Manager</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css">
  <script type="text/javascript" src="/eel.js"></script>
</head>
<body>
<div id="app" style="display:flex;height:100vh;overflow:hidden">

  <!-- ══ 사이드바 ══ -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="flex items-center gap-2.5">
        <div style="width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,#6366f1,#8b5cf6);display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(99,102,241,0.4);flex-shrink:0">
          <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="white" stroke-width="2.3"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
        </div>
        <div>
          <div class="text-white font-bold" style="font-size:13.5px;letter-spacing:-0.01em">VOC Manager</div>
          <div style="font-size:10px;color:rgba(148,163,184,0.5);margin-top:1px">업무 관리 시스템</div>
        </div>
      </div>
    </div>

    <nav class="flex-1 overflow-y-auto" style="padding:6px 0">
      <template v-for="(m, idx) in activeMenus" :key="m.id">
        <div v-if="m.section && (idx===0 || activeMenus[idx-1].section !== m.section)"
          class="nav-section-label" :style="idx>0?'margin-top:4px':''">{{ m.section }}</div>
        <div @click="clickMenu(m)" :class="['nav-item', activeId===m.id?'active':'']">
          <div class="shrink-0 flex items-center justify-center"
            style="width:15px;height:15px;border-radius:4px"
            :style="{background:m.icon_color||'#6366f1'}">
            <svg width="9" height="9" fill="none" viewBox="0 0 24 24" stroke="white" stroke-width="2.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z"/>
            </svg>
          </div>
          <span class="truncate">{{ m.label }}</span>
        </div>
      </template>
    </nav>

    <!-- 처리중 현황 -->
    <div class="border-t px-3 py-2.5" style="border-color:rgba(255,255,255,0.05)">
      <div style="font-size:9.5px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:rgba(148,163,184,0.4);margin-bottom:6px;padding:0 4px">처리중 현황</div>
      <div class="space-y-0.5">
        <div v-for="w in workload.filter(x=>x.active)" :key="w.id"
          class="flex items-center gap-2 px-1 py-0.5 rounded-lg"
          :class="w.is_absent?'opacity-35':''">
          <div class="w-1.5 h-1.5 rounded-full shrink-0"
            :class="(w.open_count+w.in_progress_count)>3?'bg-orange-400':'bg-indigo-400'"></div>
          <span class="text-xs flex-1 truncate" style="color:rgba(148,163,184,0.75)">{{ w.name }}</span>
          <span v-if="!w.is_absent" class="text-xs font-bold shrink-0"
            :class="(w.open_count+w.in_progress_count)>3?'text-orange-400':'text-indigo-400'">
            {{ w.open_count + w.in_progress_count }}
          </span>
        </div>
      </div>
    </div>

    <!-- 줌 -->
    <div class="flex items-center justify-center gap-2 px-3 py-2" style="border-top:1px solid rgba(255,255,255,0.05)">
      <button @click="setZoom(-0.05)"
        class="flex items-center justify-center rounded-lg text-base leading-none select-none"
        style="width:26px;height:26px;color:rgba(100,116,139,0.8);background:transparent"
        onmouseover="this.style.background='rgba(255,255,255,0.08)'" onmouseout="this.style.background='transparent'">−</button>
      <span style="font-size:10.5px;color:rgba(100,116,139,0.7);width:36px;text-align:center;font-family:monospace">{{ Math.round(uiZoom*100) }}%</span>
      <button @click="setZoom(0.05)"
        class="flex items-center justify-center rounded-lg text-base leading-none select-none"
        style="width:26px;height:26px;color:rgba(100,116,139,0.8);background:transparent"
        onmouseover="this.style.background='rgba(255,255,255,0.08)'" onmouseout="this.style.background='transparent'">+</button>
    </div>
  </aside>

  <!-- ══ 콘텐츠 iframe ══ -->
  <iframe id="content-frame" src="" style="flex:1;border:none;background:#f8fafc"></iframe>
</div>

<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<script src="js/shell.js"></script>
</body>
</html>
