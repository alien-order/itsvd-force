<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>VOC Manager</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="app" class="app-layout">

  <!-- ══════════════════════════════════════════════
       사이드바
  ══════════════════════════════════════════════ -->
  <aside class="sidebar">
    <div class="px-5 py-5 border-b border-slate-700">
      <div class="text-white font-bold text-base tracking-tight">VOC Manager</div>
      <div class="text-slate-400 text-xs mt-0.5">업무 관리 시스템</div>
    </div>

    <nav class="flex-1 py-3 overflow-y-auto">
      <div class="px-3">
        <div class="text-slate-500 text-xs font-semibold px-3 mb-2 uppercase tracking-wider">VOC</div>

        <div @click="switchMenu('allvoc')" :class="['nav-item', activeMenu==='allvoc'?'active':'']">
          <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"/></svg>
          전체 VOC
        </div>

        <div @click="switchMenu('active')" :class="['nav-item', activeMenu==='active'?'active':'']">
          <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
          처리중인 VOC
          <span v-if="activeVocList.length" class="ml-auto text-xs font-bold bg-blue-500 text-white px-1.5 py-0.5 rounded-full">{{ activeVocList.length }}</span>
        </div>

        <div @click="switchMenu('stats')" :class="['nav-item', activeMenu==='stats'?'active':'']">
          <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
          VOC 통계
        </div>

        <div class="text-slate-500 text-xs font-semibold px-3 mt-4 mb-2 uppercase tracking-wider">지식</div>

        <div @click="switchMenu('knowledge')" :class="['nav-item', activeMenu==='knowledge'?'active':'']">
          <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
          레퍼런스
        </div>

        <div @click="switchMenu('board')" :class="['nav-item', activeMenu==='board'?'active':'']">
          <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"/></svg>
          공유문서
        </div>

        <div class="text-slate-500 text-xs font-semibold px-3 mt-4 mb-2 uppercase tracking-wider">시스템</div>

        <div @click="switchMenu('settings')" :class="['nav-item', activeMenu==='settings'?'active':'']">
          <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><circle cx="12" cy="12" r="3" stroke-width="2"/></svg>
          설정
        </div>
      </div>
    </nav>

    <!-- 사이드바 하단: 담당자 현황 -->
    <div class="border-t border-slate-700 px-4 py-3">
      <div class="text-slate-500 text-xs mb-2">처리중 현황</div>
      <div class="space-y-1.5">
        <div v-for="w in workload.filter(x=>x.active)" :key="w.id" class="flex items-center gap-2">
          <div :class="['avatar sm', w.is_absent?'opacity-40':'']" style="background:#334155;color:#94a3b8">{{ w.name.charAt(0) }}</div>
          <div class="flex-1 min-w-0">
            <div :class="['text-xs truncate', w.is_absent?'text-slate-500':'text-slate-300']">{{ w.name }}</div>
            <div v-if="w.vacation_type" class="text-xs text-amber-400 leading-tight">{{ w.vacation_type }}</div>
          </div>
          <span v-if="w.priority_next" class="text-xs text-blue-400 opacity-80" title="1순번 우선">★</span>
          <span v-else-if="w.hold_turns>0" class="text-xs text-orange-400 opacity-70">↩</span>
          <div v-if="!w.is_absent" class="text-xs font-semibold" :class="(w.open_count+w.in_progress_count)>3?'text-orange-400':'text-slate-400'">
            {{ w.open_count + w.in_progress_count }}
          </div>
        </div>
      </div>
    </div>
  </aside>

  <!-- ══════════════════════════════════════════════
       미들 패널
  ══════════════════════════════════════════════ -->
  <div class="middle-panel">

    <!-- ── 1. 전체 VOC ── -->
    <template v-if="activeMenu==='allvoc'">
      <div class="px-4 py-3 border-b border-slate-100">
        <div class="font-semibold text-slate-800 text-sm mb-2">전체 VOC
          <span class="text-slate-400 font-normal text-xs ml-1">{{ allVocList.length }}건</span>
        </div>
        <input v-model="allVocSearch" @input="onAllVocSearch" type="text" placeholder="검색..." class="inp text-xs py-1.5 mb-2">
        <!-- 날짜 범위 -->
        <div class="flex items-center gap-1.5 mb-1.5">
          <input v-model="allVocDateFrom" @change="loadAllVoc" type="date" class="inp text-xs py-1 flex-1">
          <span class="text-slate-400 text-xs shrink-0">~</span>
          <input v-model="allVocDateTo" @change="loadAllVoc" type="date" class="inp text-xs py-1 flex-1">
          <button v-if="allVocDateFrom||allVocDateTo" @click="allVocDateFrom='';allVocDateTo='';loadAllVoc()"
            class="text-slate-400 hover:text-red-500 text-sm shrink-0 leading-none">×</button>
        </div>
        <div class="grid grid-cols-2 gap-1.5 mb-1.5">
          <select v-model="allVocStatus" @change="loadAllVoc" class="inp text-xs py-1">
            <option value="all">전체 상태</option>
            <option v-for="s in statusList" :key="s" :value="s">{{ statusLabel[s] }}</option>
          </select>
          <select v-model="allVocCategory" @change="loadAllVoc" class="inp text-xs py-1">
            <option value="all">전체 유형</option>
            <option v-for="c in categoryList" :key="c.id" :value="c.name">{{ c.name }}</option>
          </select>
        </div>
        <select v-model="allVocAssignee" @change="loadAllVoc" class="inp text-xs py-1">
          <option value="all">전체 담당자</option>
          <option value="unassigned">미배정</option>
          <option v-for="a in assignees" :key="a.id" :value="String(a.id)">{{ a.name }}</option>
        </select>
      </div>
      <div class="flex-1 overflow-y-auto">
        <div v-if="allVocList.length===0" class="empty-state h-40">VOC가 없습니다</div>
        <div v-for="v in allVocList" :key="v.id"
          :class="['voc-item', selectedVoc?.id===v.id?'selected':'']" @click="openVoc(v)">
          <div class="flex items-center gap-1.5 mb-0.5">
            <span class="text-xs font-mono text-slate-400">{{ v.voc_number||('#'+v.id) }}</span>
            <span :class="['badge','status-'+v.status]">{{ statusLabel[v.status] }}</span>
            <span v-if="v.category" class="text-xs text-slate-400 truncate">{{ v.category }}</span>
          </div>
          <div class="text-sm font-medium text-slate-800 truncate">{{ v.title }}</div>
          <div class="flex items-center gap-2 mt-1 text-xs text-slate-400">
            <span>{{ v.assignee_name||'미배정' }}</span>
            <span v-if="v.due_date" :class="ddayCls(v.due_date)">{{ ddayLabel(v.due_date) }}</span>
            <span class="ml-auto">{{ v.created_at?.slice(0,10) }}</span>
          </div>
        </div>
      </div>
    </template>

    <!-- ── 2. 처리중인 VOC ── -->
    <template v-if="activeMenu==='active'">
      <div class="px-4 py-3 border-b border-slate-100">
        <div class="flex items-center gap-2 mb-2">
          <span class="font-semibold text-slate-800 text-sm flex-1">처리중인 VOC</span>
          <button @click="showFetchForm=!showFetchForm" class="btn btn-primary text-xs px-3 py-1.5">+ 새 VOC</button>
        </div>
        <!-- 다음 순번 -->
        <div v-if="nextUp?.next_assignee" class="flex items-center gap-1.5 mb-2 text-xs">
          <span class="text-slate-400">다음 순번</span>
          <span class="font-semibold text-slate-700">{{ nextUp.next_assignee.name }}</span>
          <span v-if="nextUp.next_assignee.hold_turns>0" class="bg-orange-100 text-orange-600 px-1.5 py-0.5 rounded-full">보류 {{ nextUp.next_assignee.hold_turns }}회</span>
        </div>
        <!-- 담당자 필터 -->
        <select v-model="activeAssigneeId" @change="loadActiveVocs" class="inp text-xs py-1.5">
          <option value="all">전체 담당자</option>
          <option v-for="w in workload.filter(x=>x.active)" :key="w.id" :value="String(w.id)">
            {{ w.name }}{{ w.is_absent ? ' (휴가)' : ' (' + (w.open_count + w.in_progress_count) + ')' }}
          </option>
        </select>
      </div>

      <!-- 새 VOC 접수 폼 -->
      <div v-if="showFetchForm" class="border-b border-slate-100 bg-blue-50 px-4 py-3">
        <div class="flex gap-2 mb-2">
          <input v-model="vocNumInput" @keyup.enter="fetchVoc" type="text" placeholder="VOC 번호"
            class="inp text-xs py-1.5 flex-1">
          <button @click="fetchVoc" :disabled="vocFetching" class="btn btn-dark text-xs px-3 whitespace-nowrap">
            {{ vocFetching ? '...' : '불러오기' }}
          </button>
        </div>
        <p v-if="fetchError" class="text-xs text-red-500 mb-2 whitespace-pre-line">{{ fetchError }}</p>
        <div v-if="previewData" class="space-y-2">
          <input v-model="previewData.title" type="text" placeholder="제목*" class="inp text-xs py-1.5">
          <textarea v-model="previewData.content" rows="2" placeholder="내용*" class="inp text-xs py-1.5"></textarea>
          <div class="grid grid-cols-2 gap-2">
            <input v-model="previewData.requester" type="text" placeholder="요청자" class="inp text-xs py-1.5">
            <input v-model="previewData.due_date" type="text" placeholder="완료요청일" class="inp text-xs py-1.5">
          </div>
          <div class="grid grid-cols-2 gap-2">
            <select v-model="previewData.category" class="inp text-xs py-1.5">
              <option value="">유형 선택</option>
              <option v-for="c in categoryList" :key="c.id" :value="c.name">{{ c.name }}</option>
            </select>
            <select v-model="previewData.priority" class="inp text-xs py-1.5">
              <option value="low">낮음</option><option value="normal">보통</option>
              <option value="high">높음</option><option value="urgent">긴급</option>
            </select>
          </div>
          <select v-model="forcedAssigneeId" class="inp text-xs py-1.5">
            <option value="">자동 배정 (라운드로빈)</option>
            <option v-for="a in assignees.filter(x=>x.active)" :key="a.id" :value="String(a.id)">지정: {{ a.name }}</option>
          </select>
          <button @click="submitVoc" :disabled="submitting"
            :class="['btn w-full text-xs', forcedAssigneeId?'btn-dark':'btn-primary']">
            {{ submitting ? '접수 중...' : forcedAssigneeId ? '접수 (지정 배정)' : '자동 배정으로 접수' }}
          </button>
        </div>
        <div v-if="lastCreated" class="mt-2 p-2 bg-green-100 rounded-lg text-xs text-green-800 flex items-center gap-1.5">
          <span>완료</span>
          <strong>{{ lastCreated.assignee_name }}</strong>
          <span v-if="lastAssignInfo" :class="['px-1.5 py-0.5 rounded', assignTypeColor[lastAssignInfo.type]]">{{ assignTypeLabel[lastAssignInfo.type] }}</span>
        </div>
      </div>

      <!-- VOC 목록 -->
      <div class="flex-1 overflow-y-auto">
        <div v-if="activeVocList.length===0" class="empty-state h-40">처리중인 VOC가 없습니다</div>
        <div v-for="v in activeVocList" :key="v.id"
          :class="['voc-item', selectedVoc?.id===v.id?'selected':'']" @click="openVoc(v)">
          <div class="flex items-start gap-2">
            <div class="flex-1 min-w-0">
              <div class="flex items-center gap-1.5 mb-0.5">
                <span class="text-xs font-mono text-slate-400">{{ v.voc_number||('#'+v.id) }}</span>
                <span :class="['badge','priority-'+v.priority]">{{ priorityLabel[v.priority] }}</span>
                <span :class="['badge','status-'+v.status]">{{ statusLabel[v.status] }}</span>
              </div>
              <div class="text-sm font-medium text-slate-800 truncate">{{ v.title }}</div>
              <div class="flex items-center gap-2 mt-1">
                <span v-if="v.assignee_name" class="flex items-center gap-1 text-xs text-slate-500">
                  <span class="avatar sm">{{ v.assignee_name.charAt(0) }}</span>{{ v.assignee_name }}
                </span>
                <span v-else class="text-xs text-red-400 font-medium">미배정</span>
                <span v-if="v.due_date" :class="['text-xs ml-auto', ddayCls(v.due_date)]">{{ ddayLabel(v.due_date) }}</span>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- 하단 버튼 -->
      <div class="border-t border-slate-100 px-4 py-3 space-y-2">
        <button @click="syncStatuses" :disabled="syncing"
          :class="['btn w-full text-xs', syncing?'btn-secondary':'bg-teal-600 text-white hover:bg-teal-700']">
          {{ syncing ? '동기화 중...' : '상태 동기화' }}
        </button>
        <div v-if="syncResult" class="text-xs rounded-lg px-3 py-2"
          :class="syncResult.success?'bg-teal-50 text-teal-800':'bg-red-50 text-red-700'">
          <template v-if="syncResult.success">
            <span class="font-semibold">{{ syncResult.updated?.length||0 }}건 변경</span>
            <span v-if="syncResult.failed?.length" class="ml-2 text-slate-400">실패 {{ syncResult.failed.length }}건</span>
            <div v-for="u in syncResult.updated" :key="u.id" class="text-slate-500">
              {{ u.voc_number }}: {{ statusLabel[u.old] }} → {{ statusLabel[u.new] }}
            </div>
          </template>
          <span v-else>{{ syncResult.error }}</span>
        </div>
        <button @click="copyReport" :class="['btn w-full text-xs', reportCopied?'btn-secondary':'btn-dark']">
          {{ reportCopied ? '복사됨 ✓' : '메신저 현황 복사' }}
        </button>
      </div>
    </template>

    <!-- ── 3. VOC 통계 ── -->
    <template v-if="activeMenu==='stats'">
      <div class="px-4 py-3 border-b border-slate-100">
        <div class="font-semibold text-slate-800 text-sm mb-3">VOC 통계</div>
        <div class="flex gap-1">
          <button v-for="m in [{k:'monthly',l:'월별'},{k:'weekly',l:'주별'},{k:'assignee',l:'담당자별'}]" :key="m.k"
            @click="statsMode=m.k;loadStats()"
            :class="['text-xs px-3 py-1.5 rounded-md font-medium transition-colors',
              statsMode===m.k?'bg-blue-600 text-white':'bg-slate-100 text-slate-600 hover:bg-slate-200']">
            {{ m.l }}
          </button>
        </div>
      </div>
      <div class="flex-1 overflow-y-auto">
        <div v-if="statsData.length===0" class="empty-state h-40">데이터가 없습니다</div>

        <!-- 월별 / 주별 -->
        <template v-if="statsMode!=='assignee'">
          <div v-for="item in statsData" :key="item.period"
            :class="['board-item', selectedStat?.period===item.period?'selected':'']"
            @click="selectedStat=item">
            <div class="flex items-center justify-between">
              <span class="text-sm font-semibold text-slate-800">{{ formatPeriod(item.period, statsMode) }}</span>
              <span class="text-sm font-bold text-blue-600">{{ item.total }}건</span>
            </div>
            <div class="flex gap-1 flex-wrap mt-1.5">
              <span v-for="c in item.categories.slice(0,4)" :key="c.category"
                class="text-xs bg-slate-100 text-slate-600 px-1.5 py-0.5 rounded">
                {{ c.category }} {{ c.count }}
              </span>
              <span v-if="item.categories.length>4" class="text-xs text-slate-400">+{{ item.categories.length-4 }}</span>
            </div>
          </div>
        </template>

        <!-- 담당자별 -->
        <template v-if="statsMode==='assignee'">
          <div v-for="w in statsData" :key="w.id"
            :class="['board-item', selectedStat?.id===w.id?'selected':'']"
            @click="selectedStat=w">
            <div class="flex items-center gap-2">
              <div class="avatar">{{ w.name.charAt(0) }}</div>
              <div class="flex-1">
                <div class="text-sm font-medium text-slate-800">{{ w.name }}</div>
                <div class="flex gap-2 text-xs mt-0.5">
                  <span class="text-blue-500">접수 {{ w.open_count }}</span>
                  <span class="text-yellow-600">처리중 {{ w.in_progress_count }}</span>
                  <span class="text-green-600">완료 {{ w.done_count }}</span>
                </div>
              </div>
              <span v-if="w.hold_turns>0" class="text-xs bg-orange-100 text-orange-600 px-1.5 py-0.5 rounded-full">보류 {{ w.hold_turns }}</span>
            </div>
          </div>
        </template>
      </div>
    </template>

    <!-- ── 4. 레퍼런스 ── -->
    <template v-if="activeMenu==='knowledge'">
      <div class="px-4 py-3 border-b border-slate-100">
        <div class="flex items-center gap-2 mb-2">
          <span class="font-semibold text-slate-800 text-sm flex-1">레퍼런스</span>
          <button @click="newKnowledge" class="btn btn-primary text-xs px-3 py-1.5">+ 등록</button>
        </div>
        <input v-model="knowledgeSearch" @input="onKSearch" type="text" placeholder="검색..." class="inp text-xs py-1.5 mb-1.5">
        <select v-model="knowledgeCat" @change="loadKnowledge" class="inp text-xs py-1 mb-1.5">
          <option value="all">전체 카테고리</option>
          <option v-for="c in categoryList" :key="c.id" :value="c.name">{{ c.name }}</option>
        </select>
        <select v-model="knowledgeProcessType" @change="loadKnowledge" class="inp text-xs py-1">
          <option value="all">전체 처리유형</option>
          <option value="데이터추출">데이터추출</option>
          <option value="로직분석">로직분석</option>
          <option value="가이드">가이드</option>
        </select>
      </div>
      <div class="flex-1 overflow-y-auto">
        <div v-if="knowledgeList.length===0" class="empty-state h-40">등록된 레퍼런스가 없습니다</div>
        <div v-for="k in knowledgeList" :key="k.id"
          :class="['board-item', selectedKnowledge?.id===k.id?'selected':'']" @click="openKnowledge(k)">
          <div class="text-sm font-medium text-slate-800 truncate">{{ k.title }}</div>
          <div class="flex items-center gap-2 mt-1 flex-wrap">
            <span v-if="k.category" class="text-xs bg-blue-50 text-blue-600 px-1.5 py-0.5 rounded font-medium">{{ k.category }}</span>
            <span v-if="k.process_type" class="text-xs bg-purple-50 text-purple-600 px-1.5 py-0.5 rounded font-medium">{{ k.process_type }}</span>
            <span class="text-xs text-slate-400 ml-auto">{{ k.updated_at?.slice(0,10) }}</span>
          </div>
        </div>
      </div>
    </template>

    <!-- ── 5. 공유문서 ── -->
    <template v-if="activeMenu==='board'">
      <div class="px-4 py-3 border-b border-slate-100">
        <div class="flex items-center gap-2 mb-2">
          <span class="font-semibold text-slate-800 text-sm flex-1">공유문서</span>
          <button @click="newPost" class="btn btn-primary text-xs px-3 py-1.5">+ 새 글</button>
        </div>
        <input v-model="boardSearch" @input="onBSearch" type="text" placeholder="검색..." class="inp text-xs py-1.5 mb-2">
        <select v-model="boardCat" @change="loadBoard" class="inp text-xs py-1">
          <option value="all">전체 카테고리</option>
          <option v-for="c in boardCats" :key="c" :value="c">{{ c }}</option>
        </select>
      </div>
      <div class="flex-1 overflow-y-auto">
        <div v-if="boardList.length===0" class="empty-state h-40">등록된 문서가 없습니다</div>
        <div v-for="p in boardList" :key="p.id"
          :class="['board-item', selectedPost?.id===p.id?'selected':'']" @click="openPost(p)">
          <div class="text-sm font-medium text-slate-800 truncate">{{ p.title }}</div>
          <div class="flex items-center gap-2 mt-1">
            <span v-if="p.category" class="text-xs bg-slate-100 px-1.5 py-0.5 rounded text-slate-600">{{ p.category }}</span>
            <span v-if="p.file_count>0" class="text-xs text-blue-500">첨부 {{ p.file_count }}</span>
            <span class="text-xs text-slate-400 ml-auto">{{ p.created_at?.slice(0,10) }}</span>
          </div>
        </div>
      </div>
    </template>

    <!-- ── 6. 설정 ── -->
    <template v-if="activeMenu==='settings'">
      <div class="px-4 py-3 border-b border-slate-100">
        <div class="font-semibold text-slate-800 text-sm">설정</div>
      </div>
      <div class="flex-1 overflow-y-auto py-1">

        <div @click="settingsTab='scraping'"
          :class="['board-item flex items-center gap-3', settingsTab==='scraping'?'selected':'']">
          <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" class="shrink-0 text-slate-400"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"/></svg>
          <div>
            <div class="text-sm font-medium text-slate-800">VOC 조회 설정</div>
            <div class="text-xs text-slate-400 mt-0.5">URL 패턴 · CSS 셀렉터</div>
          </div>
        </div>

        <div @click="settingsTab='members'"
          :class="['board-item flex items-center gap-3', settingsTab==='members'?'selected':'']">
          <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" class="shrink-0 text-slate-400"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
          <div>
            <div class="text-sm font-medium text-slate-800">담당자 관리</div>
            <div class="text-xs text-slate-400 mt-0.5">배정 순번 · 활성화</div>
          </div>
          <span class="ml-auto text-xs text-slate-400">{{ assignees.length }}명</span>
        </div>

        <div @click="settingsTab='rules'"
          :class="['board-item flex items-center gap-3', settingsTab==='rules'?'selected':'']">
          <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" class="shrink-0 text-slate-400"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"/></svg>
          <div>
            <div class="text-sm font-medium text-slate-800">전담 배정 규칙</div>
            <div class="text-xs text-slate-400 mt-0.5">카테고리별 고정 담당자</div>
          </div>
          <span v-if="assignmentRules.length" class="ml-auto text-xs text-slate-400">{{ assignmentRules.length }}건</span>
        </div>

        <div @click="settingsTab='vacation'"
          :class="['board-item flex items-center gap-3', settingsTab==='vacation'?'selected':'']">
          <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" class="shrink-0 text-slate-400"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
          <div>
            <div class="text-sm font-medium text-slate-800">휴가 / 반차</div>
            <div class="text-xs text-slate-400 mt-0.5">연차 · 오전/오후반차</div>
          </div>
          <span v-if="vacations.filter(v=>!v.is_past).length" class="ml-auto text-xs bg-amber-100 text-amber-700 px-1.5 py-0.5 rounded-full">
            {{ vacations.filter(v=>!v.is_past).length }}
          </span>
        </div>

        <div @click="settingsTab='categories'"
          :class="['board-item flex items-center gap-3', settingsTab==='categories'?'selected':'']">
          <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" class="shrink-0 text-slate-400"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"/></svg>
          <div>
            <div class="text-sm font-medium text-slate-800">유형 관리</div>
            <div class="text-xs text-slate-400 mt-0.5">VOC 유형 추가 · 삭제 · 순서</div>
          </div>
          <span v-if="categoryList.length" class="ml-auto text-xs text-slate-400">{{ categoryList.length }}</span>
        </div>

      </div>
    </template>

  </div>

  <!-- ══════════════════════════════════════════════
       우측 패널
  ══════════════════════════════════════════════ -->
  <div class="right-panel">

    <!-- ── VOC 상세 (active + allvoc 공용) ── -->
    <template v-if="(activeMenu==='active'||activeMenu==='allvoc') && selectedVoc">

      <!-- 헤더 -->
      <div class="bg-white border-b border-slate-200 px-6 py-4">
        <div class="flex items-center gap-2 mb-1 flex-wrap">
          <span class="text-xs font-mono bg-slate-100 px-2 py-0.5 rounded text-slate-500">{{ selectedVoc.voc_number||('#'+selectedVoc.id) }}</span>
          <span :class="['badge','priority-'+selectedVoc.priority]">{{ priorityLabel[selectedVoc.priority] }}</span>
          <span :class="['badge','status-'+selectedVoc.status]">{{ statusLabel[selectedVoc.status] }}</span>
          <span v-if="selectedVoc.category" class="text-xs bg-slate-100 text-slate-500 px-2 py-0.5 rounded">{{ selectedVoc.category }}</span>
          <span v-if="selectedVoc.due_date" :class="['text-xs font-semibold', ddayCls(selectedVoc.due_date)]">
            {{ ddayLabel(selectedVoc.due_date) }} ({{ selectedVoc.due_date }})
          </span>
        </div>
        <h2 class="text-lg font-semibold text-slate-900 leading-tight">{{ selectedVoc.title }}</h2>
        <p v-if="selectedVoc.requester" class="text-sm text-slate-400 mt-0.5">요청자: {{ selectedVoc.requester }}</p>
      </div>

      <!-- 탭 -->
      <div class="right-tab-bar bg-white">
        <div @click="rightTab='detail'"  :class="['right-tab', rightTab==='detail'?'active':'']">내용</div>
        <div @click="rightTab='refTab'" :class="['right-tab', rightTab==='refTab'?'active':'']">
          레퍼런스
          <span v-if="vocLinks.length>0" class="ml-1 text-xs bg-blue-100 text-blue-700 px-1.5 py-0.5 rounded-full">{{ vocLinks.length }}</span>
        </div>
        <div @click="rightTab='memo'"   :class="['right-tab', rightTab==='memo'?'active':'']">
          메모
          <span v-if="vocNotes.length>0" class="ml-1 text-xs bg-slate-200 text-slate-600 px-1.5 py-0.5 rounded-full">{{ vocNotes.length }}</span>
        </div>
        <div @click="rightTab='similar'" :class="['right-tab', rightTab==='similar'?'active':'']">
          유사 VOC
          <span v-if="similarVocs.length>0" class="ml-1 text-xs bg-slate-200 text-slate-600 px-1.5 py-0.5 rounded-full">{{ similarVocs.length }}</span>
        </div>
      </div>

      <div class="p-6">

        <!-- Tab 1: 내용 -->
        <div v-if="rightTab==='detail'" class="space-y-5">

          <!-- VOC 내용 -->
          <div class="card p-5">
            <p class="text-sm text-slate-700 whitespace-pre-wrap leading-relaxed">{{ selectedVoc.content }}</p>
            <div v-if="vocImages.length>0" class="flex gap-2 flex-wrap mt-4 pt-4 border-t border-slate-100">
              <img v-for="(p,i) in vocImages" :key="i" :src="p"
                class="w-20 h-20 object-cover rounded-lg border border-slate-200 cursor-pointer hover:border-purple-400"
                @click="window.open(p,'_blank')">
            </div>
          </div>

          <!-- 담당자 배정 -->
          <div class="card p-4">
            <div v-if="selectedVoc.assignee_id" class="flex items-center gap-2 mb-3 pb-3 border-b border-slate-100">
              <div class="avatar">{{ (selectedVoc.assignee_name||'?').charAt(0) }}</div>
              <span class="text-sm font-medium text-slate-800">{{ selectedVoc.assignee_name }}</span>
              <span class="text-xs text-slate-400">현재 담당자</span>
            </div>
            <div v-else class="flex items-center gap-2 mb-3 pb-3 border-b border-slate-100">
              <div class="w-7 h-7 rounded-full bg-slate-100 flex items-center justify-center shrink-0 text-slate-400 text-xs">?</div>
              <span class="text-sm text-slate-400">미배정</span>
            </div>
            <!-- 한 줄 배정 컨트롤 -->
            <div class="flex items-center gap-2">
              <button @click="autoAssignVoc" class="btn btn-primary text-xs px-3 whitespace-nowrap shrink-0">자동 배정</button>
              <select v-model="reassignId" class="inp text-xs py-1.5 flex-1 min-w-0">
                <option value="">담당자 선택</option>
                <option v-for="a in assignees.filter(x=>x.active)" :key="a.id" :value="String(a.id)">{{ a.name }}</option>
              </select>
              <button @click="doReassign" :disabled="!reassignId"
                class="btn btn-secondary text-xs px-3 whitespace-nowrap shrink-0 disabled:opacity-40">
                배정
              </button>
            </div>
          </div>

          <!-- 배정 이력 -->
          <div v-if="vocHistory.length>0" class="card p-5">
            <h3 class="text-xs font-semibold text-slate-500 uppercase tracking-wide mb-3">배정 이력</h3>
            <div class="space-y-2">
              <div v-for="h in vocHistory" :key="h.id" class="flex gap-2 items-start">
                <div class="timeline-dot mt-1.5"></div>
                <div class="flex-1 min-w-0">
                  <div class="flex items-center gap-2 flex-wrap">
                    <span class="text-sm font-medium text-slate-700">{{ h.assignee_name }}</span>
                    <span :class="['text-xs px-1.5 py-0.5 rounded font-medium', assignTypeColor[h.assignment_type]||'bg-slate-100 text-slate-600']">
                      {{ assignTypeLabel[h.assignment_type]||h.assignment_type }}
                    </span>
                  </div>
                  <div v-if="h.note" class="text-xs text-slate-400 mt-0.5">{{ h.note }}</div>
                  <div class="text-xs text-slate-400">{{ h.assigned_at }}</div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- Tab 2: 레퍼런스 -->
        <div v-if="rightTab==='refTab'" class="space-y-5">

          <!-- 연결된 레퍼런스 (클릭 시 레퍼런스로 이동) -->
          <div class="card p-5">
            <h3 class="text-sm font-semibold text-slate-700 mb-3">연결된 레퍼런스 <span class="text-slate-400 font-normal">({{ vocLinks.length }})</span></h3>
            <div v-if="vocLinks.length===0" class="text-xs text-slate-400 py-2">연결된 레퍼런스가 없습니다</div>
            <div v-else class="space-y-2 mb-2">
              <div v-for="k in vocLinks" :key="k.id"
                class="flex items-center gap-2 px-3 py-2 bg-slate-50 rounded-lg cursor-pointer hover:bg-blue-50 group"
                @click="goToKnowledge(k.id)">
                <div class="flex-1 min-w-0">
                  <div class="text-sm font-medium text-slate-800 truncate group-hover:text-blue-700">{{ k.title }}</div>
                  <div class="flex items-center gap-1.5 mt-0.5">
                    <span v-if="k.category" class="text-xs text-blue-600">{{ k.category }}</span>
                    <span v-if="k.process_type" class="text-xs text-purple-500">{{ k.process_type }}</span>
                  </div>
                </div>
                <button @click.stop="unlinkKnowledge(k.id)" class="text-slate-300 hover:text-red-500 text-sm shrink-0">×</button>
              </div>
            </div>
          </div>

          <!-- 검색 및 연결 -->
          <div class="card p-5">
            <h3 class="text-sm font-semibold text-slate-700 mb-3">레퍼런스 검색</h3>
            <input v-model="kLinkSearch" @input="onKLinkSearch" type="text" placeholder="제목, 내용, 태그로 검색..." class="inp text-sm mb-3">
            <div v-if="kLinkResults.length>0" class="space-y-1.5 mb-3 max-h-48 overflow-y-auto">
              <div v-for="k in kLinkResults" :key="k.id"
                class="flex items-center gap-2 px-3 py-2 border border-slate-100 rounded-lg hover:border-blue-200">
                <div class="flex-1 min-w-0">
                  <div class="text-sm text-slate-800 truncate">{{ k.title }}</div>
                  <span v-if="k.category" class="text-xs text-blue-600">{{ k.category }}</span>
                </div>
                <button @click="linkKnowledge(k.id)"
                  :disabled="vocLinks.some(l=>l.id===k.id)"
                  :class="['btn text-xs px-2 py-1', vocLinks.some(l=>l.id===k.id)?'btn-secondary opacity-50':'btn-primary']">
                  {{ vocLinks.some(l=>l.id===k.id) ? '연결됨' : '연결' }}
                </button>
              </div>
            </div>
            <div v-else-if="kLinkSearch.trim()" class="text-xs text-slate-400 mb-3 py-2 text-center">검색 결과 없음</div>
          </div>

          <!-- 새 레퍼런스 등록 -->
          <div class="card p-5">
            <button @click="kLinkCreating=!kLinkCreating"
              class="text-sm font-medium text-blue-600 hover:text-blue-800 flex items-center gap-1">
              <span>{{ kLinkCreating ? '▲' : '▼' }}</span> 새 레퍼런스 등록 및 연결
            </button>
            <div v-if="kLinkCreating" class="mt-3 space-y-2">
              <input v-model="kLinkForm.title" type="text" placeholder="제목*" class="inp text-sm">
              <div class="grid grid-cols-2 gap-2">
                <select v-model="kLinkForm.category" class="inp text-sm">
                  <option value="">카테고리</option>
                  <option v-for="c in categoryList" :key="c.id" :value="c.name">{{ c.name }}</option>
                </select>
                <select v-model="kLinkForm.process_type" class="inp text-sm">
                  <option value="">처리유형</option>
                  <option value="데이터추출">데이터추출</option>
                  <option value="로직분석">로직분석</option>
                  <option value="가이드">가이드</option>
                </select>
              </div>
              <input v-model="kLinkForm.tags" type="text" placeholder="태그 (쉼표 구분)" class="inp text-sm">
              <textarea v-model="kLinkForm.content" rows="4" placeholder="내용..." class="inp text-sm"></textarea>
              <button @click="saveAndLinkKnowledge" :disabled="!kLinkForm.title.trim()" class="btn btn-primary text-sm w-full disabled:opacity-40">
                등록 및 연결
              </button>
            </div>
          </div>
        </div>

        <!-- Tab 3: 메모 -->
        <div v-if="rightTab==='memo'" class="space-y-5">
          <div class="card p-5">
            <h3 class="text-sm font-semibold text-slate-700 mb-3">메모 추가</h3>
            <div class="flex gap-2 mb-2">
              <input v-model="memoDate" type="date" class="inp text-sm flex-1">
              <div class="relative w-24 shrink-0">
                <input v-model="memoMinutes" type="number" min="0" placeholder="0" class="inp text-sm pr-8">
                <span class="absolute right-3 top-1/2 -translate-y-1/2 text-xs text-slate-400 pointer-events-none">분</span>
              </div>
            </div>
            <textarea v-model="memoText" rows="3" placeholder="메모 내용..." class="inp text-sm mb-2"></textarea>
            <button @click="addNote" :disabled="!memoText.trim()" class="btn btn-primary text-sm w-full disabled:opacity-40">추가</button>
          </div>
          <div v-if="vocNotes.length>0" class="space-y-3">
            <div v-for="n in [...vocNotes].reverse()" :key="n.id" class="card p-4">
              <div class="flex items-center gap-2 mb-2 text-xs text-slate-500">
                <span class="font-medium">{{ n.note_date || n.created_at?.slice(0,10) }}</span>
                <span v-if="n.work_minutes" class="bg-slate-100 px-1.5 py-0.5 rounded">{{ n.work_minutes }}분</span>
              </div>
              <p class="text-sm text-slate-700 whitespace-pre-wrap leading-relaxed">{{ n.content }}</p>
            </div>
          </div>
          <div v-else class="text-center text-xs text-slate-400 py-8">메모가 없습니다</div>
        </div>

        <!-- Tab 4: 유사 VOC -->
        <div v-if="rightTab==='similar'">
          <div v-if="similarVocs.length===0" class="empty-state h-48">유사한 과거 VOC가 없습니다</div>
          <div v-else class="space-y-3">
            <div v-for="v in similarVocs" :key="v.id" @click="openVoc(v)"
              class="card p-4 cursor-pointer hover:border-blue-200 transition-all">
              <div class="flex items-start justify-between gap-2 mb-1">
                <span class="text-sm font-medium text-slate-800 leading-tight flex-1">{{ v.title }}</span>
                <span :class="['badge','status-'+v.status,'shrink-0']">{{ statusLabel[v.status] }}</span>
              </div>
              <p class="text-xs text-slate-500 line-clamp-2 mb-2">{{ v.content }}</p>
              <div class="flex gap-2 text-xs text-slate-400">
                <span v-if="v.voc_number" class="font-mono bg-slate-100 px-1.5 py-0.5 rounded">{{ v.voc_number }}</span>
                <span>{{ v.assignee_name||'미배정' }}</span>
                <span class="ml-auto">{{ v.due_date||v.created_at?.slice(0,10) }}</span>
              </div>
            </div>
          </div>
        </div>

      </div>
    </template>

    <!-- VOC 미선택 -->
    <div v-if="(activeMenu==='active'||activeMenu==='allvoc') && !selectedVoc"
      class="empty-state h-full flex-col gap-3 text-slate-400">
      <svg width="48" height="48" fill="none" viewBox="0 0 24 24" stroke="currentColor" class="text-slate-200">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
      </svg>
      <span>목록에서 VOC를 선택하세요</span>
    </div>

    <!-- ── VOC 통계 우측 ── -->
    <template v-if="activeMenu==='stats'">
      <!-- 월별/주별 기간 선택됨 -->
      <div v-if="statsMode!=='assignee' && selectedStat" class="p-6 max-w-2xl">
        <div class="mb-5">
          <h2 class="text-xl font-semibold text-slate-900">{{ formatPeriod(selectedStat.period, statsMode) }}</h2>
          <p class="text-sm text-slate-400 mt-0.5">총 {{ selectedStat.total }}건</p>
        </div>
        <div class="space-y-3 mb-6">
          <div v-for="cat in selectedStat.categories" :key="cat.category"
            class="cursor-pointer group" @click="goToAllVocFiltered(selectedStat.period, cat.category)">
            <div class="flex items-center justify-between mb-1">
              <span class="text-sm text-slate-700 group-hover:text-blue-600 font-medium">{{ cat.category }}</span>
              <span class="text-sm font-bold text-slate-800">{{ cat.count }}건</span>
            </div>
            <div class="h-2 bg-slate-100 rounded-full overflow-hidden">
              <div class="h-full bg-blue-400 rounded-full transition-all"
                :style="{ width: (cat.count / selectedStat.total * 100) + '%' }"></div>
            </div>
          </div>
        </div>
        <button @click="goToAllVocFiltered(selectedStat.period, null)" class="btn btn-secondary text-sm">
          이 기간 전체 VOC 보기
        </button>
      </div>

      <!-- 담당자별 선택됨 -->
      <div v-else-if="statsMode==='assignee' && selectedStat" class="p-6 max-w-xl">
        <div class="flex items-center gap-4 mb-6">

        </div>
        <div class="card p-5">
          <h3 class="text-sm font-semibold text-slate-700 mb-3">예정 휴가</h3>
          <div v-if="!vacations.filter(v=>!v.is_past).length" class="text-xs text-slate-400 py-2 text-center">예정된 휴가가 없습니다</div>
          <div v-else class="divide-y divide-slate-100">
            <div v-for="v in vacations.filter(v=>!v.is_past)" :key="v.id" class="flex items-center gap-3 py-2.5">
              <div class="avatar sm shrink-0">{{ v.assignee_name.charAt(0) }}</div>
              <span class="text-sm font-medium text-slate-800 w-14 shrink-0">{{ v.assignee_name }}</span>
              <span class="text-sm text-slate-700 flex-1 font-mono">{{ v.vacation_date }}</span>
              <span :class="['text-xs px-2 py-0.5 rounded-full font-medium shrink-0',
                v.vacation_type==='연차'?'bg-red-100 text-red-700':
                v.vacation_type==='오전반차'?'bg-amber-100 text-amber-700':'bg-orange-100 text-orange-700']">
                {{ v.vacation_type }}
              </span>
              <button @click="deleteVacation(v.id)" class="btn btn-danger text-xs shrink-0">삭제</button>
            </div>
          </div>
        </div>
        <div class="card p-5">
          <h3 class="text-sm font-semibold text-slate-700 mb-3">지난 휴가 이력</h3>
          <div v-if="!vacations.filter(v=>v.is_past).length" class="text-xs text-slate-400 py-2 text-center">이력이 없습니다</div>
          <div v-else class="divide-y divide-slate-100">
            <div v-for="v in vacations.filter(v=>v.is_past)" :key="v.id" class="flex items-center gap-3 py-2 opacity-60">
              <div class="avatar sm shrink-0">{{ v.assignee_name.charAt(0) }}</div>
              <span class="text-sm text-slate-600 w-14 shrink-0">{{ v.assignee_name }}</span>
              <span class="text-sm text-slate-500 flex-1 font-mono">{{ v.vacation_date }}</span>
              <span :class="['text-xs px-2 py-0.5 rounded-full font-medium shrink-0',
                v.vacation_type==='연차'?'bg-red-50 text-red-500':
                v.vacation_type==='오전반차'?'bg-amber-50 text-amber-600':'bg-orange-50 text-orange-600']">
                {{ v.vacation_type }}
              </span>
              <span v-if="v.assignments_missed>0" class="text-xs text-blue-500 shrink-0">배정 {{ v.assignments_missed }}건 누락</span>
            </div>
          </div>
        </div>
      </template>

      <!-- ▸ 유형 관리 -->
      <template v-if="settingsTab==='categories'">
        <h2 class="text-base font-semibold text-slate-800">유형 관리</h2>
        <div class="card p-5">
          <p class="text-xs text-slate-400 mb-4">VOC 유형 목록을 관리합니다. 모든 유형 드롭다운에 반영됩니다.</p>
          <div class="flex gap-2 mb-4">
            <input v-model="newCategoryName" @keyup.enter="addCategory" type="text" placeholder="유형명 입력" class="inp flex-1">
            <button @click="addCategory" class="btn btn-primary">추가</button>
          </div>
          <p v-if="categoryError" class="text-xs text-red-500 mb-3">{{ categoryError }}</p>
          <div v-if="categoryList.length===0" class="text-xs text-slate-400 py-4 text-center bg-slate-50 rounded-lg">등록된 유형이 없습니다</div>
          <div v-else class="divide-y divide-slate-100">
            <div v-for="(c, idx) in categoryList" :key="c.id" class="flex items-center gap-2 py-2.5">
              <div class="flex flex-col gap-0.5 shrink-0">
                <button @click="moveCategoryItem(idx,-1)" :disabled="idx===0" class="text-slate-300 hover:text-slate-600 disabled:opacity-20 text-xs leading-none">▲</button>
                <button @click="moveCategoryItem(idx,1)" :disabled="idx===categoryList.length-1" class="text-slate-300 hover:text-slate-600 disabled:opacity-20 text-xs leading-none">▼</button>
              </div>
              <span class="text-xs text-slate-400 w-4 text-center shrink-0">{{ idx+1 }}</span>
              <span class="text-sm flex-1 text-slate-800">{{ c.name }}</span>
              <button @click="deleteCategoryItem(c.id)" class="btn btn-danger text-xs shrink-0">삭제</button>
            </div>
          </div>
        </div>
      </template>

    </div>

  </div><!-- /right-panel -->
</div><!-- /app -->

<script src="/eel.js"></script>
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<script src="js/app.js"></script>
</body>
</html>
