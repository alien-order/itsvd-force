<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>전체 VOC</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../css/style.css">
  <script type="text/javascript" src="/eel.js"></script>
</head>
<body style="margin:0;height:100%;overflow:hidden">
<div id="app" style="display:flex;height:100%;overflow:hidden;background:#f8fafc">

  <!-- ══ 미들 패널 ══ -->
  <div class="middle-panel">
    <div class="mp-header">
      <div class="flex items-center gap-2 mb-2">
        <span class="mp-title">전체 VOC</span>
        <span class="mp-count">{{ vocList.length }}건</span>
      </div>
      <!-- 필터 -->
      <div class="space-y-1.5">
        <input v-model="filterSearch" @input="debouncedLoad" type="text" placeholder="제목, 내용, 번호 검색" class="inp text-xs py-1.5">
        <div class="flex gap-1.5">
          <select v-model="filterStatus" @change="loadVocs" class="inp text-xs py-1.5 flex-1">
            <option value="all">전체 상태</option>
            <option v-for="s in statusList" :key="s" :value="s">{{ statusLabel[s] }}</option>
          </select>
          <select v-model="filterAssigneeId" @change="loadVocs" class="inp text-xs py-1.5 flex-1">
            <option value="all">전체 담당자</option>
            <option value="unassigned">미배정</option>
            <option v-for="a in assignees.filter(x=>x.active)" :key="a.id" :value="String(a.id)">{{ a.name }}</option>
          </select>
        </div>
        <div class="flex gap-1.5">
          <select v-model="filterCategoryParent" @change="onCategoryParentChange" class="inp text-xs py-1.5 flex-1">
            <option value="all">전체 업무유형</option>
            <option v-for="c in parentCategoryList" :key="c.id" :value="c.name">{{ c.name }}</option>
          </select>
          <select v-model="filterCategoryChild" @change="loadVocs" class="inp text-xs py-1.5 flex-1"
            :class="childCategoryList.length===0&&filterCategoryParent!=='all'?'opacity-50':''">
            <option value="all">전체 업무</option>
            <option v-for="c in childCategoryList" :key="c.id" :value="c.name">{{ c.name }}</option>
          </select>
        </div>
        <div class="flex gap-1.5">
          <select v-model="filterProcessType" @change="loadVocs" class="inp text-xs py-1.5 flex-1">
            <option value="all">전체 VOC유형</option>
            <option v-for="p in processTypeList" :key="p.id" :value="p.value||p.name">{{ p.name }}</option>
          </select>
          <select v-model="filterYear" @change="onYearChange" class="inp text-xs py-1.5" style="width:80px;flex-shrink:0">
            <option value="">전체</option>
            <option v-for="y in years" :key="y" :value="y">{{ y }}</option>
          </select>
        </div>
        <div class="flex gap-1.5">
          <input v-model="filterDateFrom" @change="loadVocs" type="date" class="inp text-xs py-1.5 flex-1">
          <span class="self-center text-xs text-slate-300 shrink-0">~</span>
          <input v-model="filterDateTo" @change="loadVocs" type="date" class="inp text-xs py-1.5 flex-1">
        </div>
      </div>
    </div>

    <!-- VOC 목록 -->
    <div class="flex-1 overflow-y-auto">
      <div v-if="vocList.length===0" class="empty-state h-40">해당 조건의 VOC가 없습니다</div>
      <div v-for="v in vocList" :key="v.id"
        :class="['voc-item', selected?.id===v.id?'selected':'']" @click="openVoc(v)">
        <div class="flex-1 min-w-0">
          <!-- 제목 + 등록일 -->
          <div class="flex items-center gap-2 mb-0.5">
            <div class="text-sm font-medium text-slate-800 truncate flex-1">{{ v.title }}</div>
            <span class="text-xs text-slate-300 shrink-0">{{ v.created_at?.slice(0,10) }}</span>
          </div>
          <!-- 담당자 + 상태 -->
          <div class="flex items-center gap-1.5">
            <span class="text-xs font-mono text-slate-400 shrink-0">{{ v.voc_number || ('#'+v.id) }}</span>
            <span :class="['badge','status-'+v.status]">{{ statusLabel[v.status] }}</span>
            <span v-if="v.requester" class="text-xs text-slate-500 ml-auto shrink-0">{{ v.requester }}</span>
          </div>
          <!-- 업무유형 › 하위유형 -->
          <div v-if="v.sysbizcode || v.sysbizcode1 || v.bizNmDept || v.category" class="flex items-center gap-1 mt-0.5">
            <template v-if="v.sysbizcode || v.sysbizcode1">
              <span class="text-xs text-slate-400">{{ v.sysbizcode || '-' }}</span>
              <span v-if="v.sysbizcode1" class="text-xs text-slate-300">›</span>
              <span v-if="v.sysbizcode1" class="text-xs text-slate-400">{{ v.sysbizcode1 }}</span>
            </template>
            <template v-else-if="v.bizNmDept">
              <span class="text-xs text-slate-400">{{ v.bizNmDept }}</span>
            </template>
            <template v-else>
              <span class="text-xs text-slate-400">{{ categoryParentMap[v.category] || v.category }}</span>
              <span v-if="categoryParentMap[v.category]" class="text-xs text-slate-300">›</span>
              <span v-if="categoryParentMap[v.category]" class="text-xs text-slate-400">{{ v.category }}</span>
            </template>
            <span v-if="v.process_type" class="text-xs text-slate-300 ml-1">·</span>
            <span v-if="v.process_type" class="text-xs text-slate-400">{{ v.process_type }}</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 리사이즈 핸들 -->
  <div class="resize-handle" @mousedown.prevent="startResize"></div>

  <!-- ══ 우측 패널 ══ -->
  <div class="right-panel">
    <template v-if="selected">
      <div class="bg-white border-b border-slate-200 px-5 py-3">
        <div class="flex items-center gap-2 mb-1 flex-wrap">
          <a :href="'https://naver.com/'+( selected.voc_number||selected.id)" target="_blank"
             class="text-xs font-mono bg-slate-100 px-2 py-0.5 rounded text-slate-500 hover:text-blue-600 hover:bg-blue-50 cursor-pointer">{{ selected.voc_number||('#'+selected.id) }}</a>
          <span v-if="selected.priority&&selected.priority!=='normal'" :class="['badge','priority-'+selected.priority]">{{ priorityLabel[selected.priority] }}</span>
          <span :class="['badge','status-'+selected.status]">{{ statusLabel[selected.status] }}</span>
          <span v-if="selected.category" class="text-xs bg-slate-100 text-slate-500 px-2 py-0.5 rounded">{{ selected.category }}</span>
          <span v-if="selected.due_date" :class="['text-xs font-semibold',ddayCls(selected.due_date)]">{{ ddayLabel(selected.due_date) }} ({{ selected.due_date }})</span>
        </div>
        <h2 class="text-lg font-semibold text-slate-900 leading-tight">{{ selected.title }}</h2>
        <div class="flex gap-4 mt-0.5 text-xs text-slate-400">
          <span v-if="selected.requester">요청자: {{ selected.requester }}</span>
          <span>등록: {{ selected.created_at?.slice(0,10) }}</span>
        </div>
      </div>
      <div class="right-tab-bar bg-white">
        <div @click="rightTab='detail'"  :class="['right-tab',rightTab==='detail'?'active':'']">내용</div>
        <div @click="rightTab='refTab'" :class="['right-tab',rightTab==='refTab'?'active':'']">레퍼런스<span v-if="vocLinks.length" class="ml-1 text-xs bg-blue-100 text-blue-700 px-1.5 py-0.5 rounded-full">{{ vocLinks.length }}</span></div>
        <div @click="rightTab='memo'"   :class="['right-tab',rightTab==='memo'?'active':'']">메모</div>
        <div @click="rightTab='similar'" :class="['right-tab',rightTab==='similar'?'active':'']">유사 VOC</div>
        <div @click="rightTab='assign'"  :class="['right-tab',rightTab==='assign'?'active':'']">배정</div>
      </div>
      <div class="p-6">

        <!-- 내용 탭 -->
        <div v-if="rightTab==='detail'" class="space-y-3">

          <!-- 기본정보 카드 -->
          <div class="info-card">
            <div class="info-card-header slate">기본정보</div>
            <table style="table-layout:fixed;width:100%">
              <colgroup><col style="width:16.67%"><col style="width:16.67%"><col style="width:16.67%"><col style="width:16.67%"><col style="width:16.67%"><col style="width:16.67%"></colgroup>
              <tbody>
                <tr>
                  <th>신청자총괄</th><td>{{ vocInfo.registerorgname || '-' }}</td>
                  <th>신청자GBM</th><td>{{ vocInfo.registergbmname || '-' }}</td>
                  <th>VOC번호</th><td class="mono">{{ vocInfo.vocno || selected.voc_number || '-' }}</td>
                </tr>
                <tr>
                  <th>신청자</th><td>{{ [vocInfo.registername, vocInfo.register_singleid].filter(x=>x).join(' / ') || '-' }}</td>
                  <th>신청자부서</th><td>{{ vocInfo.registerdeptname || '-' }}</td>
                  <th>신청일시</th><td>{{ formatVocDate(vocInfo.regdate, vocInfo.regtime) }}</td>
                </tr>
              </tbody>
            </table>
          </div>

          <!-- 상세정보 카드 -->
          <div class="info-card">
            <div class="info-card-header slate">상세정보</div>
            <table style="table-layout:fixed;width:100%">
              <colgroup><col style="width:16.67%"><col style="width:16.67%"><col style="width:16.67%"><col style="width:16.67%"><col style="width:16.67%"><col style="width:16.67%"></colgroup>
              <tbody>
                <tr>
                  <th>제목</th><td colspan="5" class="title-cell">{{ vocInfo.voctitle || selected.title || '-' }}</td>
                </tr>
                <tr>
                  <th>전화번호</th><td>{{ vocInfo.wirtercomptelno || '-' }}</td>
                  <th>휴대폰번호</th><td>{{ vocInfo.writermobiletelno || '-' }}</td>
                  <th>이메일</th><td>{{ vocInfo.writeremail || '-' }}</td>
                </tr>
                <tr>
                  <th>등록자</th><td>{{ vocInfo.writername || '-' }}</td>
                  <th>등록자부서</th><td>{{ vocInfo.writerdeptname || '-' }}</td>
                  <th>접수일시</th><td>{{ formatVocDate(vocInfo.acceptdate, vocInfo.accepttime) }}</td>
                </tr>
                <tr>
                  <th>시스템</th><td>{{ vocInfo.systemname || '-' }}</td>
                  <th>완료요청일</th><td>{{ formatVocDate(vocInfo.endreqdate, vocInfo.endreqtime) }}</td>
                  <th>완료예정일</th><td>{{ formatVocDate(vocInfo.endplandate, vocInfo.endplantime) }}</td>
                </tr>
                <tr>
                  <th>VOC담당GBM</th><td>{{ vocInfo.gbmname || '-' }}</td>
                  <th>업무유형</th><td>{{ vocInfo.sysbizcode && vocInfo.sysbizcode1 ? (vocInfo.sysbizcode + ' › ' + vocInfo.sysbizcode1) : (vocInfo.sysbizcode || vocInfo.sysbizcode1 || vocInfo.bizNmDept || selected.category || '-') }}</td>
                  <th>세부진행상태</th><td>{{ vocStatusMap[vocInfo.vocstatuscode] || vocInfo.vocstatusnm || '-' }}</td>
                </tr>
                <tr>
                  <th>VOC유형</th><td colspan="5">{{ vocInfo.voctypename || '-' }}</td>
                </tr>
              </tbody>
            </table>
          </div>

          <!-- 신청내용 카드 (vocInfoList[0]) -->
          <div class="info-card">
            <div class="info-card-header blue">
              <span>신청내용</span>
              <template v-if="firstStage">
                <div class="meta">
                  <span>{{ firstStage.registername }}</span>
                  <span>{{ formatVocDate(firstStage.regdate, firstStage.regtime) }}</span>
                </div>
              </template>
            </div>
            <div class="info-card-body">
              <p v-if="firstStage && firstStage.voctitle" class="content-title">{{ firstStage.voctitle }}</p>
              <p class="content-text">{{ (firstStage && firstStage.voctext) || selected.content || '-' }}</p>
            </div>
          </div>

          <!-- 처리 단계 카드들 (vocInfoList[1+]) -->
          <div v-for="(s, idx) in laterStages" :key="s.id || idx" class="info-card">
            <div class="info-card-header green">
              <span>처리정보</span>
              <span v-if="s.vocstatuscode" class="stage-badge">{{ vocStatusMap[s.vocstatuscode] || s.vocstatuscode }}</span>
            </div>
            <table style="table-layout:fixed;width:100%">
              <colgroup><col style="width:16.67%"><col style="width:16.67%"><col style="width:16.67%"><col style="width:16.67%"><col style="width:16.67%"><col style="width:16.67%"></colgroup>
              <tbody>
                <tr>
                  <th>등록자</th><td>{{ (s.stage_data && s.stage_data.registername) || '-' }}</td>
                  <th>등록자부서</th><td>{{ (s.stage_data && s.stage_data.deptname) || '-' }}</td>
                  <th>등록일시</th><td>{{ s.stage_data ? formatVocDate(s.stage_data.regdate, s.stage_data.regtime) : '-' }}</td>
                </tr>
              </tbody>
            </table>
            <div class="info-card-body">
              <p v-if="s.stage_data && s.stage_data.voctitle" class="content-title">{{ s.stage_data.voctitle }}</p>
              <p v-if="s.stage_data && s.stage_data.voctext" class="content-text">{{ s.stage_data.voctext }}</p>
            </div>
          </div>

          <div v-if="vocImages.length" class="flex gap-2 flex-wrap">
            <img v-for="(p,i) in vocImages" :key="i" :src="p" class="w-20 h-20 object-cover rounded-lg border border-slate-200 cursor-pointer" @click="window.open(p,'_blank')">
          </div>
        </div>

        <!-- 레퍼런스 탭 -->
        <div v-if="rightTab==='refTab'" class="space-y-5">
          <div class="card p-5">
            <h3 class="text-sm font-semibold text-slate-700 mb-3">연결된 레퍼런스 <span class="text-slate-400 font-normal">({{ vocLinks.length }})</span></h3>
            <div v-if="!vocLinks.length" class="text-xs text-slate-400 py-2">연결된 레퍼런스가 없습니다</div>
            <div v-else class="space-y-2 mb-2">
              <div v-for="k in vocLinks" :key="k.id" class="flex items-center gap-2 px-3 py-2 bg-slate-50 rounded-lg">
                <div class="flex-1 min-w-0">
                  <div class="text-sm font-medium text-slate-800 truncate cursor-pointer hover:text-blue-600"
                       @click="openKnowledgeDetail(k.id)">{{ k.title }}</div>
                  <span v-if="k.category" class="text-xs text-blue-600">{{ k.category }}</span>
                </div>
                <button @click="unlinkKnowledge(k.id)" class="text-slate-300 hover:text-red-500 text-sm shrink-0">×</button>
              </div>
            </div>
          </div>
          <div class="card p-5">
            <h3 class="text-sm font-semibold text-slate-700 mb-3">레퍼런스 검색</h3>
            <input v-model="kLinkSearch" @input="onKLinkSearch" type="text" placeholder="검색..." class="inp text-sm mb-3">
            <div v-if="kLinkResults.length" class="space-y-1.5 max-h-48 overflow-y-auto">
              <div v-for="k in kLinkResults" :key="k.id" class="flex items-center gap-2 px-3 py-2 border border-slate-100 rounded-lg hover:border-blue-200">
                <div class="flex-1 min-w-0"><div class="text-sm text-slate-800 truncate">{{ k.title }}</div></div>
                <button @click="linkKnowledge(k.id)" :disabled="vocLinks.some(l=>l.id===k.id)"
                  :class="['btn text-xs px-2 py-1', vocLinks.some(l=>l.id===k.id)?'btn-secondary opacity-50':'btn-primary']">
                  {{ vocLinks.some(l=>l.id===k.id) ? '연결됨' : '연결' }}
                </button>
              </div>
            </div>
          </div>
        </div>

        <!-- 메모 탭 -->
        <div v-if="rightTab==='memo'" class="space-y-5">
          <div class="card p-5">
            <h3 class="text-sm font-semibold text-slate-700 mb-3">메모 추가</h3>
            <div class="flex gap-2 mb-2">
              <input v-model="memoDate" type="date" class="inp text-sm flex-1">
              <div class="relative w-24 shrink-0">
                <input v-model="memoMinutes" type="number" min="0" placeholder="0" class="inp text-sm pr-8">
                <span class="absolute right-3 top-1/2 -translate-y-1/2 text-xs text-slate-400 pointer-events-none">분</span>
              </div>
            </div>
            <textarea v-model="memoText" rows="3" placeholder="메모 내용..." class="inp text-sm mb-2"></textarea>
            <button @click="addNote" :disabled="!memoText.trim()" class="btn btn-primary text-sm w-full disabled:opacity-40">추가</button>
          </div>
          <div v-if="vocMemos.length" class="space-y-3">
            <div v-for="n in [...vocMemos].reverse()" :key="n.id" class="card p-4">
              <div class="flex items-center gap-2 mb-2 text-xs text-slate-500">
                <span class="font-medium">{{ n.note_date||n.created_at?.slice(0,10) }}</span>
                <span v-if="n.work_minutes" class="bg-slate-100 px-1.5 py-0.5 rounded">{{ n.work_minutes }}분</span>
              </div>
              <div v-html="renderContent(n.content)" class="text-sm text-slate-700 leading-relaxed prose-content"></div>
            </div>
          </div>
        </div>

        <!-- 배정 탭 -->
        <div v-if="rightTab==='assign'" class="space-y-4">
          <div class="card p-5">
            <h3 class="text-sm font-semibold text-slate-700 mb-3">담당자 변경</h3>
            <div class="flex gap-2">
              <select v-model="reassignId" class="inp text-sm flex-1">
                <option value="">미배정</option>
                <option v-for="a in assignees.filter(x=>x.active)" :key="a.id" :value="String(a.id)">{{ a.name }}</option>
              </select>
              <button @click="doReassign" :disabled="!reassignId" class="btn btn-secondary text-xs px-3 shrink-0 disabled:opacity-40">변경</button>
            </div>
          </div>
          <div v-if="vocHistory.length" class="card p-5">
            <h3 class="text-sm font-semibold text-slate-700 mb-3">배정 이력</h3>
            <div class="space-y-2">
              <div v-for="h in vocHistory" :key="h.id" class="flex items-start gap-2 text-xs text-slate-600 border-b border-slate-50 pb-2 last:border-0 last:pb-0">
                <span class="text-slate-400 shrink-0">{{ h.assigned_at?.slice(0,16) }}</span>
                <span class="font-medium shrink-0">{{ h.assignee_name }}</span>
                <span class="text-slate-400">{{ h.note }}</span>
              </div>
            </div>
          </div>
          <div v-else class="text-xs text-slate-400 text-center py-4">배정 이력이 없습니다</div>
        </div>

        <!-- 유사 VOC 탭 -->
        <div v-if="rightTab==='similar'">
          <div v-if="!similarVocs.length" class="empty-state h-48">유사한 VOC가 없습니다</div>
          <div v-else class="space-y-1">
            <div v-for="v in similarVocs" :key="v.id" @click="openVoc(v)"
                 class="voc-item cursor-pointer hover:border-blue-200">
              <div class="flex-1 min-w-0">
                <div class="flex items-center gap-2 mb-0.5">
                  <div class="text-sm font-medium text-slate-800 truncate flex-1">{{ v.title }}</div>
                  <span class="text-xs text-slate-300 shrink-0">{{ v.created_at?.slice(0,10) }}</span>
                </div>
                <div class="flex items-center gap-1.5">
                  <span class="text-xs font-mono text-slate-400 shrink-0">{{ v.voc_number || ('#'+v.id) }}</span>
                  <span :class="['badge','status-'+v.status]">{{ statusLabel[v.status] }}</span>
                  <span v-if="v.requester" class="text-xs text-slate-500 ml-auto shrink-0">{{ v.requester }}</span>
                </div>
                <div v-if="v.sysbizcode || v.sysbizcode1 || v.bizNmDept || v.category" class="flex items-center gap-1 mt-0.5">
                  <template v-if="v.sysbizcode || v.sysbizcode1">
                    <span class="text-xs text-slate-400">{{ v.sysbizcode || '-' }}</span>
                    <span v-if="v.sysbizcode1" class="text-xs text-slate-300">›</span>
                    <span v-if="v.sysbizcode1" class="text-xs text-slate-400">{{ v.sysbizcode1 }}</span>
                  </template>
                  <template v-else-if="v.bizNmDept">
                    <span class="text-xs text-slate-400">{{ v.bizNmDept }}</span>
                  </template>
                  <template v-else>
                    <span class="text-xs text-slate-400">{{ categoryParentMap[v.category] || v.category }}</span>
                    <span v-if="categoryParentMap[v.category]" class="text-xs text-slate-300">›</span>
                    <span v-if="categoryParentMap[v.category]" class="text-xs text-slate-400">{{ v.category }}</span>
                  </template>
                </div>
              </div>
            </div>
          </div>
        </div>

      </div>
    </template>
    <div v-else class="empty-state h-full flex-col gap-3 text-slate-400">
      <svg width="48" height="48" fill="none" viewBox="0 0 24 24" stroke="currentColor" class="text-slate-200"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
      <span>목록에서 VOC를 선택하세요</span>
    </div>
  </div>

</div>
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<script src="../js/common.js"></script>
<script>
const { createApp, ref, computed, onMounted } = Vue;
createApp({
  setup() {
    const { mpWidth, applyWidth, startResize } = useMpResize();

    const typeItems = ref({});
    const statusLabel        = computed(() => buildStatusLabel(typeItems.value['voc_status']||[]));
    const statusList         = computed(() => buildStatusList(typeItems.value['voc_status']||[]));
    const parentCategoryList = computed(() => (typeItems.value['category']||[]).filter(x=>!x.parent_id));
    const processTypeList    = computed(() => typeItems.value['process_type']||[]);

    const assignees = ref([]);
    const years     = ref([]);

    // 필터
    const filterSearch          = ref('');
    const filterStatus          = ref('all');
    const filterAssigneeId      = ref('all');
    const filterCategoryParent  = ref('all');
    const filterCategoryChild   = ref('all');
    const filterProcessType     = ref('all');
    const filterDateFrom        = ref('');
    const filterDateTo          = ref('');
    const filterYear            = ref('');

    const childCategoryList = computed(() => {
      if (filterCategoryParent.value === 'all') return [];
      const parent = (typeItems.value['category']||[]).find(x=>!x.parent_id && x.name===filterCategoryParent.value);
      if (!parent) return [];
      return (typeItems.value['category']||[]).filter(x=>x.parent_id===parent.id);
    });

    const categoryParentMap = computed(() => {
      const items = typeItems.value['category'] || [];
      const map = {};
      for (const item of items) {
        if (item.parent_id) {
          const parent = items.find(x => x.id === item.parent_id);
          if (parent) map[item.name] = parent.name;
        }
      }
      return map;
    });
    const vocStatusMap = computed(() => {
      const items = typeItems.value['voc_status'] || [];
      return Object.fromEntries(items.filter(i=>i.value).map(i=>[i.value, i.name]));
    });

    const newVocChildList = computed(() => {
      if (!newVoc.value.categoryParent) return [];
      const parent = (typeItems.value['category']||[]).find(x=>!x.parent_id && x.name===newVoc.value.categoryParent);
      if (!parent) return [];
      return (typeItems.value['category']||[]).filter(x=>x.parent_id===parent.id);
    });

    const onCategoryParentChange = () => {
      filterCategoryChild.value = 'all';
      loadVocs();
    };

    const vocList = ref([]);
    let searchTimer = null;

    const debouncedLoad = () => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(loadVocs, 300);
    };

    const onYearChange = () => {
      if (filterYear.value) {
        filterDateFrom.value = filterYear.value + '-01-01';
        filterDateTo.value   = filterYear.value + '-12-31';
      } else {
        filterDateFrom.value = '';
        filterDateTo.value   = '';
      }
      loadVocs();
    };

    const loadVocs = async () => {
      vocList.value = await eel.get_vocs(
        filterStatus.value === 'all' ? null : filterStatus.value,
        filterSearch.value || null,
        filterAssigneeId.value,
        filterCategoryChild.value === 'all' ? null : filterCategoryChild.value,
        filterDateFrom.value || null,
        filterDateTo.value || null,
        filterCategoryParent.value === 'all' ? null : filterCategoryParent.value,
        filterProcessType.value === 'all' ? null : filterProcessType.value
      )();
    };

    // VOC 상세
    const selected    = ref(null);
    const rightTab    = ref('detail');
    const vocAnswers  = ref([]);
    const vocMemos    = ref([]);
    const vocImages   = ref([]);
    const vocLinks    = ref([]);
    const vocStages   = ref([]);
    const vocInfo     = ref({});
    const vocHistory  = ref([]);
    const reassignId  = ref('');
    const similarList = ref([]);
    const similarVocs = computed(() => similarList.value.filter(v=>v.id!==selected.value?.id));
    const memoDate    = ref(todayStr());
    const memoMinutes = ref('');
    const memoText    = ref('');
    const kLinkSearch  = ref('');
    const kLinkResults = ref([]);
    let kTimer = null;

    const visibleStages = computed(() => vocStages.value);
    const firstStage  = computed(() => vocStages.value[0]  ? vocStages.value[0].stage_data  : null);
    const laterStages = computed(() => vocStages.value.slice(1));

    const openVoc = async (v) => {
      selected.value = {...v};
      rightTab.value = 'detail';
      vocStages.value = []; vocInfo.value = {}; vocHistory.value = [];
      reassignId.value = v.assignee_id ? String(v.assignee_id) : '';
      memoDate.value = todayStr(); memoMinutes.value=''; memoText.value='';
      kLinkSearch.value=''; kLinkResults.value=[];
      const [answers, memos, imgs, links, stages, info, hist] = await Promise.all([
        eel.get_voc_notes(v.id, 'answer')(),
        eel.get_voc_notes(v.id, 'memo')(),
        eel.get_voc_images(v.id)(),
        eel.get_voc_knowledge(v.id)(),
        eel.get_voc_stages(v.id)(),
        eel.get_voc_info(v.id)(),
        eel.get_assignment_history(v.id)(),
      ]);
      vocAnswers.value=answers; vocMemos.value=memos; vocImages.value=imgs; vocLinks.value=links;
      vocStages.value=stages; vocInfo.value=info; vocHistory.value=hist||[];
      similarList.value = await eel.get_similar_vocs(v.title, v.content, 5)();
    };

    const doReassign = async () => {
      if (!reassignId.value || !selected.value) return;
      const aid = parseInt(reassignId.value);
      const result = await eel.reassign_voc(selected.value.id, aid, '', false)();
      if (result.success) {
        const a = assignees.value.find(x=>x.id===aid);
        if (a) { selected.value.assignee_name=a.name; selected.value.assignee_id=a.id; }
        vocHistory.value = await eel.get_assignment_history(selected.value.id)();
      }
    };

    const addNote = async () => {
      if (!memoText.value.trim()||!selected.value) return;
      await eel.add_voc_note(selected.value.id, memoText.value, memoDate.value, parseInt(memoMinutes.value)||0, 'memo')();
      memoText.value=''; memoMinutes.value=''; memoDate.value=todayStr();
      vocMemos.value = await eel.get_voc_notes(selected.value.id, 'memo')();
    };

    const onKLinkSearch = () => {
      clearTimeout(kTimer);
      kTimer = setTimeout(async()=>{
        if(!kLinkSearch.value.trim()){kLinkResults.value=[];return;}
        kLinkResults.value = await eel.get_knowledge(kLinkSearch.value,'all')();
      }, 300);
    };
    const linkKnowledge = async(kid)=>{
      if(!selected.value) return;
      await eel.link_knowledge_to_voc(kid, selected.value.id)();
      vocLinks.value = await eel.get_voc_knowledge(selected.value.id)();
    };
    const unlinkKnowledge = async(kid)=>{
      if(!selected.value) return;
      await eel.unlink_knowledge_from_voc(kid, selected.value.id)();
      vocLinks.value = await eel.get_voc_knowledge(selected.value.id)();
    };

    const openKnowledgeDetail = (kid) => {
      if (window.parent?.navigateTo) {
        window.parent.navigateTo('pages/knowledge.html?open_id=' + kid);
      } else {
        window.open('../pages/knowledge.html?open_id=' + kid, '_blank');
      }
    };

    onMounted(async () => {
      applyWidth(mpWidth.value);
      // Read URL params (from stats page navigation)
      const params = new URLSearchParams(window.location.search);
      if (params.get('status'))          filterStatus.value         = params.get('status');
      if (params.get('assignee_id'))     filterAssigneeId.value     = params.get('assignee_id');
      if (params.get('date_from'))       filterDateFrom.value       = params.get('date_from');
      if (params.get('date_to'))         filterDateTo.value         = params.get('date_to');
      if (params.get('category_parent')) filterCategoryParent.value = params.get('category_parent');
      if (params.get('process_type'))    filterProcessType.value    = params.get('process_type');

      async function loadTypeSystem_() {
        const groups = await eel.get_type_groups()();
        const pairs  = await Promise.all(groups.map(g=>eel.get_type_items(g.code)().then(items=>[g.code,items])));
        const map={};
        for(const[c,i] of pairs) map[c]=i;
        return map;
      }
      const [map, as, yr] = await Promise.all([
        loadTypeSystem_(), eel.get_assignees()(), eel.get_years()(),
      ]);
      typeItems.value=map; assignees.value=as; years.value=yr;
      const openVocId = parseInt(params.get('open_id') || '0');
      // open_id가 있으면 날짜 필터 해제해서 해당 VOC가 목록에 나오도록
      if (openVocId) {
        filterDateFrom.value = '';
        filterDateTo.value   = '';
      } else if (!params.get('date_from') && !filterDateFrom.value) {
        // 기본 날짜: 1개월 전 ~ 오늘
        const today = new Date();
        const monthAgo = new Date(today);
        monthAgo.setMonth(monthAgo.getMonth() - 1);
        filterDateFrom.value = monthAgo.toISOString().slice(0,10);
        filterDateTo.value   = today.toISOString().slice(0,10);
      }
      await loadVocs();
      if (openVocId) {
        const found = vocList.value.find(v => v.id === openVocId);
        if (found) await openVoc(found);
      }
    });

    return {
      startResize,
      priorityLabel:PRIORITY_LABEL,
      statusLabel, statusList, parentCategoryList, processTypeList, childCategoryList, categoryParentMap, vocStatusMap,
      assignees, years,
      filterSearch, filterStatus, filterAssigneeId, filterCategoryParent, filterCategoryChild, filterProcessType,
      filterDateFrom, filterDateTo, filterYear,
      vocList, loadVocs, debouncedLoad, onYearChange, onCategoryParentChange,
      selected, rightTab, vocMemos, vocImages, vocLinks, vocStages, vocInfo, vocHistory, reassignId, visibleStages, firstStage, laterStages, similarVocs,
      memoDate, memoMinutes, memoText, kLinkSearch, kLinkResults,
      openVoc, addNote, doReassign,
      onKLinkSearch, linkKnowledge, unlinkKnowledge, openKnowledgeDetail,
      renderContent, ddayLabel, ddayCls, todayStr, formatVocDate,
    };
  }
}).mount('#app');
</script>
</body>
</html>
